name = "glidepress-site"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Static showcase site (including the admin UI at public/admin/). Matching
# assets are served before the Worker runs, so the Worker only ever sees
# non-asset paths (/packages.json, /dist/*, /admin/api/*, /changelog).
#
# not_found_handling: browser navigations (Sec-Fetch-Mode: navigate) to
# unmatched paths get public/404.html without invoking the Worker (the
# assets_navigation_prefers_asset_serving flag is default-on for our
# compatibility_date). Non-navigation requests — Composer fetching
# /packages.json and /dist/*, the admin UI calling /admin/api/* — still
# invoke the Worker as before.
#
# run_worker_first: /changelog is a Worker-rendered page with no backing
# asset, so browser navigations to it would otherwise be swallowed by the
# 404-page handling above; this forces it through to the Worker.
[assets]
directory = "./public"
not_found_handling = "404-page"
run_worker_first = ["/changelog"]

[[kv_namespaces]]
binding = "REPO"
id = "aa76fbd3fc1d46949e678aa4ff87512d"

# Per-IP brute-force limiter for the Composer and admin auth paths (see README
# "Rate limiting"). namespace_id is an arbitrary account-unique integer; period
# must be 10 or 60 seconds.
[[ratelimits]]
name = "AUTH_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[observability]
enabled = true

[[routes]]
pattern = "glidepress.jmwerk.com"
custom_domain = true
