name = "glidepress-site"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Static showcase site. Matching assets are served before the Worker runs, so
# the Worker only ever sees non-asset paths (/packages.json, /dist/*, /admin).
[assets]
directory = "./public"

[[kv_namespaces]]
binding = "REPO"
id = "aa76fbd3fc1d46949e678aa4ff87512d"

[observability]
enabled = true

[[routes]]
pattern = "glidepress.jmwerk.com"
custom_domain = true
