name = "glidepress-site"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Static showcase site (including the admin UI at public/admin/). Matching
# assets are served before the Worker runs, so the Worker only ever sees
# non-asset paths (/packages.json, /dist/*, /admin/api/*, /changelog).
#
# not_found_handling: with "404-page", ALL requests that don't match an asset
# get public/404.html without invoking the Worker — regardless of
# Sec-Fetch-Mode. Every Worker-handled route must therefore be listed in
# run_worker_first, or the 404 page swallows it. (/admin/api/* is listed
# rather than /admin/* so the static admin UI at public/admin/ keeps being
# served as an asset.)
[assets]
directory = "./public"
not_found_handling = "404-page"
run_worker_first = ["/changelog", "/packages.json", "/dist/*", "/admin/api/*"]

[[kv_namespaces]]
binding = "REPO"
id = "aa76fbd3fc1d46949e678aa4ff87512d"

# Per-IP brute-force limiter for the Composer and admin auth paths (see README
# "Rate limiting"). namespace_id is an arbitrary account-unique integer; period
# must be 10 or 60 seconds.
[[ratelimits]]
name = "AUTH_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[observability]
enabled = true

[[routes]]
pattern = "glidepress.jmwerk.com"
custom_domain = true
